<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escala NUFAP-15 — PMPB</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NUFAP-15">
  <meta name="theme-color" content="#1c2220">
  <link rel="apple-touch-icon" href="icons/icon-180x180.png">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
/* ══ PMPB THEME ══ */
:root{
  --s1:#2e3530; --s2:#3d4a42; --s3:#4f5e54;
  --g1:#5a6a60; --g2:#788a80; --g3:#96a89e;
  --sv:#b0c0b8; --sv2:#ccd8d4; --sv3:#e4ecea;
  --red:#b22222; --red2:#8B1A1A;
  --blk:#1a1e1c;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:linear-gradient(135deg,#1c2220 0%,#252e2a 55%,#1a2220 100%);
  min-height:100vh;color:var(--sv3);padding:0 0 30px;
}
.topbar{display:flex;height:10px;width:100%;}
.topbar span{flex:1;}
.tb-1{background:#96a89e;}
.tb-2{background:#5a6a60;}
.tb-3{background:#b22222;}
.app-header{
  display:flex;align-items:center;gap:16px;
  padding:10px 22px 10px;
  background:linear-gradient(180deg,rgba(90,106,96,.18),transparent);
  border-bottom:1px solid rgba(150,168,158,.2);
}
.app-header img{
  width:72px;height:72px;object-fit:contain;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.25));
}
.app-hdr-txt{flex:1;text-align:left;}
.app-header h1{font-size:1.45rem;font-weight:800;color:var(--sv2);letter-spacing:1px;margin:0 0 2px;}
.app-header p{color:var(--g3);font-size:.76rem;margin:0;}
.main{max-width:1100px;margin:18px auto;padding:0 14px;display:grid;grid-template-columns:1fr 1fr;gap:18px;}
@media(max-width:760px){.main{grid-template-columns:1fr;}}
.panel{
  background:rgba(150,168,158,.07);
  border:1px solid rgba(150,168,158,.2);
  border-radius:13px;padding:20px;backdrop-filter:blur(8px);
  max-height:92vh;overflow-y:auto;
}
.pt{font-size:.78rem;font-weight:700;color:var(--sv2);
  text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;
  border-left:3px solid var(--g2);padding-left:8px;}
.div{height:1px;background:linear-gradient(90deg,transparent,var(--g2),transparent);margin:13px 0;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:.7rem;font-weight:600;color:var(--g3);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.fg input,.fg textarea{
  width:100%;padding:8px 12px;
  background:rgba(150,168,158,.09);
  border:1px solid rgba(150,168,158,.25);
  border-radius:7px;color:var(--sv3);font-size:.88rem;
  outline:none;transition:all .2s;font-family:inherit;
}
.fg input:focus,.fg textarea:focus{
  border-color:var(--sv);background:rgba(150,168,158,.18);
  box-shadow:0 0 0 3px rgba(150,168,158,.15);
}
.per-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
.per-card{
  background:rgba(150,168,158,.08);
  border:1px solid rgba(150,168,158,.18);
  border-left:3px solid var(--g2);
  border-radius:8px;padding:9px 11px;
}
.per-card label{font-size:.65rem;font-weight:700;color:var(--sv);
  text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:3px;}
.per-card .rr{display:flex;gap:5px;}
.per-card input{
  width:100%;background:transparent;border:none;
  border-bottom:1px solid rgba(150,168,158,.3);
  color:var(--sv3);font-size:.83rem;font-weight:600;
  padding:3px 0;outline:none;
}
.per-card input:focus{border-bottom-color:var(--sv2);}
.per-card .rr input:first-child{width:50px;flex-shrink:0;}
.per-card .rr input:last-child{flex:1;}
.day-block{margin-bottom:10px;background:rgba(150,168,158,.05);
  border:1px solid rgba(150,168,158,.13);border-radius:8px;overflow:hidden;}
.day-hdr{
  background:linear-gradient(90deg,#3d4a44,#2e3a34);
  padding:8px 12px;font-size:.75rem;font-weight:700;
  letter-spacing:1.5px;color:var(--sv2);text-transform:uppercase;
}
.srow{display:grid;grid-template-columns:80px 1fr 1fr;gap:8px;padding:8px 10px;
  border-top:1px solid rgba(150,168,158,.08);align-items:center;}
.slbl{font-size:.65rem;font-weight:700;text-transform:uppercase;
  padding:3px 8px;border-radius:20px;text-align:center;}
.slbl.mn{background:rgba(27,79,138,.4);color:#88c0f0;border:1px solid rgba(136,192,240,.25);}
.slbl.af{background:rgba(90,106,96,.5);color:var(--sv2);border:1px solid rgba(150,168,158,.3);}
.ssel{
  background:rgba(150,168,158,.1);border:1px solid rgba(150,168,158,.22);
  border-radius:5px;color:var(--sv3);font-size:.78rem;
  padding:5px 8px;outline:none;cursor:pointer;width:100%;
}
.ssel:focus{border-color:var(--sv);background:rgba(150,168,158,.2);}
.ssel option{background:#252e2a;color:var(--sv3);}
.day-obs-row{padding:8px 10px;background:rgba(0,0,0,.15);}
.day-obs-ta{
  width:100%;background:rgba(90,106,98,.1);
  border:1px dashed rgba(150,168,158,.4);border-radius:7px;
  color:var(--sv3);font:inherit;font-size:.78rem;
  padding:6px 9px;resize:vertical;min-height:42px;
}
.day-obs-ta:focus{outline:none;border-color:var(--g3);background:rgba(90,106,98,.18);}
.btn-row{display:flex;gap:9px;margin-top:16px;flex-wrap:wrap;}
.btn{flex:1;min-width:100px;padding:10px 14px;border:none;border-radius:8px;
  font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;}
.btn:hover{transform:translateY(-2px);}
.b-prev{background:linear-gradient(135deg,#3d4a42,#5a6a60);color:#fff;}
.b-prev:hover{box-shadow:0 5px 18px rgba(90,106,96,.55);}
.b-pdf{background:linear-gradient(135deg,#5a2d82,#7b3fa8);color:#fff;}
.b-pdf:hover{box-shadow:0 5px 18px rgba(90,45,130,.5);}
.b-png{background:linear-gradient(135deg,#8B1A1A,#b22222);color:#fff;}
.b-png:hover{box-shadow:0 5px 18px rgba(178,34,34,.5);}
.b-rst{background:rgba(255,255,255,.08);color:var(--sv3);
  border:1px solid rgba(255,255,255,.18);flex:0 0 auto;min-width:auto;padding:10px 13px;}
.b-rst:hover{background:rgba(255,255,255,.14);}
.status{background:rgba(90,106,96,.2);border:1px solid rgba(150,168,158,.3);
  border-radius:6px;padding:6px 12px;font-size:.78rem;color:var(--sv2);
  text-align:center;margin-top:9px;display:none;}
.status.show{display:block;}
.prev-panel{display:flex;flex-direction:column;gap:12px;}
.prev-box{
  background:rgba(0,0,0,.25);border:2px dashed rgba(150,168,158,.22);
  border-radius:13px;overflow:hidden;display:flex;align-items:center;
  justify-content:center;min-height:260px;
}
.prev-ph{text-align:center;color:rgba(255,255,255,.2);padding:22px;}
.prev-ph .ic{font-size:2.5rem;display:block;margin-bottom:7px;}
#cv{max-width:100%;height:auto;display:none;border-radius:9px;}
.hint{
  background:rgba(150,168,158,.08);border:1px solid rgba(150,168,158,.2);
  border-radius:8px;padding:10px 13px;font-size:.77rem;color:var(--g3);
  text-align:center;line-height:1.5;
}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:rgba(150,168,158,.3);border-radius:3px;}
  </style>
</head>
<body>

<div class="topbar">
  <span class="tb-1"></span>
  <span class="tb-2"></span>
  <span class="tb-3"></span>
</div>

<div class="app-header">
  <div class="brasao-wrap">
    <img id="hdrBrasao" src="icons/icon-192x192.png" alt="Brasão PMPB"/>
  </div>
  <div class="app-hdr-txt">
    <h1>ESCALA NUFAP-15</h1>
    <p>Polícia Militar da Paraíba — 15º Batalhão — Gerador de Escala Oficial</p>
  </div>
</div>

<div class="main">

  <!-- EDITOR -->
  <div class="panel">
    <div class="pt">🏷️ Cabeçalho</div>
    <div class="fg">
      <label>Título</label>
      <input id="iT" value="ESCALA NUFAP-15">
    </div>
    <div class="fg">
      <label>📅 Período</label>
      <input id="iP" value="02/03 a 06/03">
    </div>

    <div class="div"></div>

    <div class="pt">👥 Militares</div>
    <div class="per-grid" id="PG">
      <!-- Militares serão inseridos aqui via JS -->
    </div>

    <div class="div"></div>

    <div class="pt">📅 Grade de Turnos</div>
    <div id="SG">
      <!-- Grade de turnos será inserida aqui via JS -->
    </div>

    <div class="div"></div>

    <div class="pt">📢 Observações / Avisos</div>
    <div class="fg">
      <label>Informações para o rodapé</label>
      <textarea id="iO" rows="4">⚠️ Qualquer alteração na escala deverá ser comunicada com antecedência mínima de 24h ao responsável pelo setor.</textarea>
    </div>

    <div class="btn-row">
      <button class="btn b-prev" onclick="doPreview()">🔍 Prévia</button>
      <button class="btn b-pdf" onclick="doPDF()">📄 PDF</button>
      <button class="btn b-png" onclick="doPNG()">⬇️ PNG</button>
      <button class="btn b-rst" onclick="doReset()" title="Resetar">↺</button>
    </div>

    <div id="SB" class="status"></div>
  </div>

  <!-- PRÉVIA -->
  <div class="prev-panel">
    <div class="panel" style="padding:0;overflow:hidden;flex:1;">
      <div class="prev-box">
        <div class="prev-ph" id="PH">
          <span class="ic">🖼️</span>
          <strong>Prévia da Escala</strong>
          <p style="margin-top:6px;font-size:.78rem;">Clique em <strong>"Prévia"</strong> para gerar</p>
        </div>
        <canvas id="cv"></canvas>
      </div>
    </div>
    <div class="hint">
      💡 <strong>PNG</strong> — fundo branco, ideal para WhatsApp<br>
      📄 <strong>PDF</strong> — formato A4 oficial com assinaturas
    </div>
  </div>

</div>

<script>
// ═══ DADOS INICIAIS ═══
const DP = [
  {rank:'CB', name:'JOSELMA'},
  {rank:'TEN', name:'BARBOSA'},
  {rank:'SGT', name:'HERISSON'},
  {rank:'CAP', name:'GABRIEL SILVA'},
  {rank:'TEN', name:'MARLON'}
];

// Escala padrão [manha1, manha2, tarde1, tarde2] para cada dia
const DS = [
  [0, 1, 1, 2],  // Segunda
  [2, 3, 0, 4],  // Terça
  [2, 0, 4, 0],  // Quarta
  [2, 3, 3, 1],  // Quinta
  [0, 1, 2, 4]   // Sexta
];

const DY = [
  {l:'SEGUNDA-FEIRA', obs:''},
  {l:'TERÇA-FEIRA', obs:''},
  {l:'QUARTA-FEIRA', obs:''},
  {l:'QUINTA-FEIRA', obs:''},
  {l:'SEXTA-FEIRA', obs:''}
];

// Estado atual
let P = JSON.parse(JSON.stringify(DP));
let S = JSON.parse(JSON.stringify(DS));

// ═══ FUNÇÕES AUXILIARES ═══
function gl(i) {
  if (i >= 0 && i < P.length) {
    return P[i].rank + ' ' + P[i].name;
  }
  return '';
}

function st(msg, ok) {
  const b = document.getElementById('SB');
  if (!msg) {
    b.classList.remove('show');
    return;
  }
  b.textContent = msg;
  b.style.background = ok ? 'rgba(90,106,96,.2)' : 'rgba(178,34,34,.2)';
  b.style.borderColor = ok ? 'rgba(150,168,158,.35)' : 'rgba(178,34,34,.4)';
  b.style.color = ok ? '#ccd8d4' : '#ff9090';
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 3500);
}

// ═══ CONSTRUÇÃO DA UI ═══
function buildP() {
  const g = document.getElementById('PG');
  g.innerHTML = '';

  P.forEach((p, i) => {
    const c = document.createElement('div');
    c.className = 'per-card';
    c.innerHTML = `
      <label>Militar ${i+1}</label>
      <div class="rr">
        <input type="text" id="p${i}r" value="${p.rank}" placeholder="Grad." 
          onchange="P[${i}].rank=this.value;updateSelects();">
        <input type="text" id="p${i}n" value="${p.name}" placeholder="Nome" 
          onchange="P[${i}].name=this.value;updateSelects();">
      </div>
    `;
    g.appendChild(c);
  });
}

function buildS() {
  const g = document.getElementById('SG');
  g.innerHTML = '';

  DY.forEach((d, di) => {
    const b = document.createElement('div');
    b.className = 'day-block';

    // Cabeçalho do dia
    const hdr = document.createElement('div');
    hdr.className = 'day-hdr';
    hdr.textContent = '📅 ' + d.l;
    b.appendChild(hdr);

    // Turno Manhã
    const rowM = document.createElement('div');
    rowM.className = 'srow';
    rowM.innerHTML = `
      <div class="slbl mn">Manhã</div>
      <select id="s${di}_0" class="ssel" onchange="S[${di}][0]=parseInt(this.value)">
        ${buildOptions(S[di][0])}
      </select>
      <select id="s${di}_1" class="ssel" onchange="S[${di}][1]=parseInt(this.value)">
        ${buildOptions(S[di][1])}
      </select>
    `;
    b.appendChild(rowM);

    // Turno Tarde
    const rowT = document.createElement('div');
    rowT.className = 'srow';
    rowT.innerHTML = `
      <div class="slbl af">Tarde</div>
      <select id="s${di}_2" class="ssel" onchange="S[${di}][2]=parseInt(this.value)">
        ${buildOptions(S[di][2])}
      </select>
      <select id="s${di}_3" class="ssel" onchange="S[${di}][3]=parseInt(this.value)">
        ${buildOptions(S[di][3])}
      </select>
    `;
    b.appendChild(rowT);

    // Observações do dia
    const obsDiv = document.createElement('div');
    obsDiv.className = 'day-obs-row';
    obsDiv.innerHTML = `
      <textarea class="day-obs-ta" placeholder="📝 Observações do dia..." 
        onchange="DY[${di}].obs=this.value">${d.obs}</textarea>
    `;
    b.appendChild(obsDiv);

    g.appendChild(b);
  });
}

function buildOptions(selectedIdx) {
  let html = '<option value="-1">— Nenhum —</option>';
  P.forEach((p, i) => {
    const selected = i === selectedIdx ? 'selected' : '';
    html += `<option value="${i}" ${selected}>${p.rank} ${p.name}</option>`;
  });
  return html;
}

function updateSelects() {
  // Atualiza todos os selects quando os nomes mudam
  DY.forEach((_, di) => {
    for (let pi = 0; pi < 4; pi++) {
      const sel = document.getElementById(`s${di}_${pi}`);
      if (sel) {
        const currentVal = parseInt(sel.value);
        sel.innerHTML = buildOptions(currentVal);
      }
    }
  });
}

function doReset() {
  P = JSON.parse(JSON.stringify(DP));
  S = JSON.parse(JSON.stringify(DS));
  DY.forEach(d => d.obs = '');

  document.getElementById('iT').value = 'ESCALA NUFAP-15';
  document.getElementById('iP').value = '02/03 a 06/03';
  document.getElementById('iO').value = '⚠️ Qualquer alteração na escala deverá ser comunicada com antecedência mínima de 24h ao responsável pelo setor.';

  buildP();
  buildS();

  document.getElementById('cv').style.display = 'none';
  document.getElementById('PH').style.display = 'block';
  st('');
}

// ═══ RENDERIZAÇÃO DO CANVAS ═══
async function drawCanvas() {
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const W = 900;

  const title = document.getElementById('iT').value || 'ESCALA NUFAP-15';
  const period = document.getElementById('iP').value || '';
  const obs = document.getElementById('iO').value || '';

  // Calcular altura baseada em conteúdo
  const obsLines = obs ? wrapText(ctx, obs, W - 86, 13) : [];
  const obsBoxH = obs ? 50 + obsLines.length * 21 : 0;
  const H = 1140 + obsBoxH;

  cv.width = W;
  cv.height = H;

  // Fundo branco
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // Barra topo PMPB
  ctx.fillStyle = '#a0b0a8';
  ctx.fillRect(0, 0, W/3, 11);
  ctx.fillStyle = '#5a6a62';
  ctx.fillRect(W/3, 0, W/3, 11);
  ctx.fillStyle = '#b22222';
  ctx.fillRect(2*W/3, 0, W/3, 11);

  // Header
  drawHeader(ctx, title, period, W);

  // Grade de dias
  let startY = 180;
  const dayH = 140;
  const gapY = 12;

  DY.forEach((d, di) => {
    const dy = startY + di * (dayH + gapY);
    drawDay(ctx, d, di, dy, W, dayH);
  });

  // Observações gerais
  if (obs) {
    const obsY = startY + DY.length * (dayH + gapY) + 20;
    drawObservations(ctx, obs, obsLines, obsY, W);
  }

  // Rodapé
  drawFooter(ctx, W, H);

  return cv;
}

function drawHeader(ctx, title, period, W) {
  const hx = 22, hy = 22, hw = W - 44, hh = 110;

  // Box do header
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = '#8a9a92';
  ctx.lineWidth = 1.5;
  roundRect(ctx, hx, hy, hw, hh, 12);
  ctx.fill();
  ctx.stroke();

  // Faixa escura no topo
  ctx.fillStyle = '#3d4a44';
  roundRect(ctx, hx, hy, hw, 38, [12, 12, 0, 0]);
  ctx.fill();

  // Textos da faixa
  ctx.fillStyle = '#d0dcd8';
  ctx.font = 'bold 11px "Segoe UI",Arial';
  ctx.textAlign = 'left';
  ctx.fillText('POLÍCIA MILITAR DA PARAÍBA', hx + 16, hy + 13);
  ctx.fillStyle = '#a0b0ac';
  ctx.font = '9.5px "Segoe UI",Arial';
  ctx.fillText('15º BATALHÃO DE POLÍCIA MILITAR — PMPB', hx + 16, hy + 28);

  // Título
  ctx.fillStyle = '#1e2622';
  ctx.font = 'bold 28px "Segoe UI",Arial';
  ctx.fillText(title, hx + 16, hy + 75);

  // Período
  ctx.fillStyle = '#5a6a62';
  ctx.font = 'bold 13px "Segoe UI",Arial';
  ctx.fillText('Período: ' + period, hx + 16, hy + 98);

  // Linha divisória
  ctx.strokeStyle = '#8a9a92';
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.moveTo(hx, hy + hh + 14);
  ctx.lineTo(hx + hw, hy + hh + 14);
  ctx.stroke();
}

function drawDay(ctx, day, idx, y, W, h) {
  const dx = 22, dw = W - 44;

  // Card do dia
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = '#c8d0cc';
  ctx.lineWidth = 1;
  roundRect(ctx, dx, y, dw, h, 10);
  ctx.fill();
  ctx.stroke();

  // Cabeçalho do dia
  const grad = ctx.createLinearGradient(dx, y, dx + dw, y);
  grad.addColorStop(0, '#3d4a44');
  grad.addColorStop(1, '#2a3530');
  ctx.fillStyle = grad;
  roundRect(ctx, dx, y, dw, 34, [10, 10, 0, 0]);
  ctx.fill();

  ctx.fillStyle = '#d0dcd8';
  ctx.font = 'bold 13px "Segoe UI",Arial';
  ctx.textAlign = 'left';
  ctx.fillText('📅  ' + day.l, dx + 14, y + 22);

  // Turnos
  drawShift(ctx, dx + 10, y + 40, (dw - 30) / 2, 42, S[idx][0], '#3d5a78', 'Manhã ☀️');
  drawShift(ctx, dx + 20 + (dw - 30) / 2, y + 40, (dw - 30) / 2, 42, S[idx][1], '#3d5a78', '');
  drawShift(ctx, dx + 10, y + 88, (dw - 30) / 2, 42, S[idx][2], '#5a6a62', 'Tarde 🌥️');
  drawShift(ctx, dx + 20 + (dw - 30) / 2, y + 88, (dw - 30) / 2, 42, S[idx][3], '#5a6a62', '');
}

function drawShift(ctx, x, y, w, h, personIdx, color, label) {
  // Fundo
  ctx.fillStyle = '#f5f6f5';
  ctx.strokeStyle = '#c0cac6';
  ctx.lineWidth = 0.7;
  roundRect(ctx, x, y, w, h, 7);
  ctx.fill();
  ctx.stroke();

  // Label se houver
  if (label) {
    ctx.fillStyle = color;
    roundRect(ctx, x + 5, y + 8, 70, 20, 10);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px "Segoe UI",Arial';
    ctx.textAlign = 'center';
    ctx.fillText(label, x + 40, y + 21);
  }

  // Nome do militar
  const name = gl(personIdx);
  if (name) {
    ctx.fillStyle = '#1e2622';
    ctx.font = 'bold 12px "Segoe UI",Arial';
    ctx.textAlign = 'center';
    ctx.fillText(name, x + w / 2 + (label ? 35 : 0), y + h / 2 + 4);
  }
}

function drawObservations(ctx, obs, lines, y, W) {
  const h = 50 + lines.length * 21;

  ctx.fillStyle = '#f5f6f5';
  ctx.strokeStyle = '#8a9a92';
  ctx.lineWidth = 1.5;
  roundRect(ctx, 22, y, W - 44, h, 10);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#3d4a44';
  ctx.font = 'bold 12px "Segoe UI",Arial';
  ctx.textAlign = 'left';
  ctx.fillText('⚠️  OBSERVAÇÕES / AVISOS', 36, y + 20);

  ctx.strokeStyle = '#8a9a92';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(36, y + 27);
  ctx.lineTo(W - 36, y + 27);
  ctx.stroke();

  ctx.fillStyle = '#2a3530';
  ctx.font = '12px "Segoe UI",Arial';
  lines.forEach((l, i) => {
    ctx.fillText(l, 36, y + 44 + i * 21);
  });
}

function drawFooter(ctx, W, H) {
  const footY = H - 38;

  ctx.strokeStyle = '#8a9a92';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(22, footY);
  ctx.lineTo(W - 22, footY);
  ctx.stroke();

  ctx.fillStyle = '#8a9a92';
  ctx.font = '10px "Segoe UI",Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Polícia Militar da Paraíba — Sistema de Escala NUFAP · ' + 
    new Date().toLocaleDateString('pt-BR'), W / 2, footY + 14);

  // Barra inferior
  ctx.fillStyle = '#a0b0a8';
  ctx.fillRect(0, H - 9, W/3, 9);
  ctx.fillStyle = '#5a6a62';
  ctx.fillRect(W/3, H - 9, W/3, 9);
  ctx.fillStyle = '#b22222';
  ctx.fillRect(2*W/3, H - 9, W/3, 9);
}

// ═══ FUNÇÕES UTILITÁRIAS ═══
function roundRect(ctx, x, y, w, h, r) {
  if (typeof r === 'number') r = [r, r, r, r];
  ctx.beginPath();
  ctx.moveTo(x + r[0], y);
  ctx.lineTo(x + w - r[1], y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r[1]);
  ctx.lineTo(x + w, y + h - r[2]);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
  ctx.lineTo(x + r[3], y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r[3]);
  ctx.lineTo(x, y + r[0]);
  ctx.quadraticCurveTo(x, y, x + r[0], y);
  ctx.closePath();
}

function wrapText(ctx, text, maxWidth, fontSize) {
  ctx.font = fontSize + 'px "Segoe UI",Arial';
  const words = text.split(' ');
  const lines = [];
  let currentLine = words[0];

  for (let i = 1; i < words.length; i++) {
    const width = ctx.measureText(currentLine + ' ' + words[i]).width;
    if (width < maxWidth) {
      currentLine += ' ' + words[i];
    } else {
      lines.push(currentLine);
      currentLine = words[i];
    }
  }
  lines.push(currentLine);
  return lines;
}

async function doPNG() {
  st('Gerando PNG...', true);
  try {
    const cv = await drawCanvas();
    document.getElementById('cv').style.display = 'block';
    document.getElementById('PH').style.display = 'none';

    const a = document.createElement('a');
    const fname = (document.getElementById('iT').value || 'Escala_NUFAP').replace(/\s+/g, '_');
    a.download = fname + '_PMPB.png';
    a.href = cv.toDataURL('image/png');
    a.click();
    st('✅ PNG baixado!', true);
  } catch (e) {
    console.error(e);
    st('❌ Erro: ' + e.message, false);
  }
}

async function doPDF() {
  if (!window.jspdf) {
    st('❌ jsPDF não carregado', false);
    return;
  }

  st('Gerando PDF...', true);
  try {
    const { jsPDF } = window.jspdf;
    const cv = await drawCanvas();
    const imgData = cv.toDataURL('image/png');

    const SC = 210 / 900;
    const pdfW = 210;
    const pdfH = Math.round(cv.height * SC);

    const doc = new jsPDF({
      orientation: pdfH > pdfW ? 'portrait' : 'landscape',
      unit: 'mm',
      format: [pdfW, pdfH]
    });

    doc.addImage(imgData, 'PNG', 0, 0, pdfW, pdfH);

    // Assinaturas
    const sigY = pdfH - 26;
    doc.setDrawColor(138, 154, 146);
    doc.setLineWidth(0.5);
    doc.line(10, sigY, pdfW - 10, sigY);

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.setTextColor(110, 120, 115);
    doc.text('Documento gerado em ' + new Date().toLocaleString('pt-BR') + 
      ' — PMPB / Sistema de Escala NUFAP', pdfW / 2, sigY + 5, { align: 'center' });

    doc.setDrawColor(80, 90, 85);
    doc.setLineWidth(0.4);
    doc.line(14, sigY + 16, 82, sigY + 16);
    doc.line(pdfW - 82, sigY + 16, pdfW - 14, sigY + 16);

    doc.setFontSize(7);
    doc.setTextColor(50, 60, 55);
    doc.text('Responsável pela Escala', 14, sigY + 20);
    doc.text('Ciente', pdfW - 82, sigY + 20);

    const fname = (document.getElementById('iT').value || 'Escala_NUFAP').replace(/\s+/g, '_');
    doc.save(fname + '_PMPB.pdf');
    st('✅ PDF baixado!', true);
  } catch (e) {
    console.error(e);
    st('❌ Erro: ' + e.message, false);
  }
}
